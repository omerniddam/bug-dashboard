name: Refresh Bug Dashboard

on:
  # Run automatically every day at 07:00 UTC (adjust to your timezone)
  schedule:
    - cron: '0 7 * * *'

  # Allow manual trigger — optionally pass a per-chart config override from the dashboard UI
  workflow_dispatch:
    inputs:
      chart_override:
        description: 'JSON: {"chartId":"c1","bug_jql":"...","resolved_statuses":["Done"],"months_of_history":6}'
        required: false
        default: ''
      bug_jql:
        description: '(Legacy) Override global bug_jql for all charts'
        required: false
        default: ''

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the generated HTML back to the repo

    steps:
      # ── 1. Check out the repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Write config.json from GitHub Secrets (+ optional JQL override) ──
      #
      # Add these secrets in:
      #   GitHub repo → Settings → Secrets and variables → Actions → New secret
      #
      #   JIRA_URL       → https://oxsecurity.atlassian.net
      #   JIRA_EMAIL     → omer.niddam@ox.security
      #   JIRA_API_TOKEN → your Atlassian API token
      #
      - name: Create config.json from secrets
        env:
          JIRA_URL:         ${{ secrets.JIRA_URL }}
          JIRA_EMAIL:       ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:   ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROXY_URL:   ${{ secrets.JIRA_PROXY_URL }}
          CHART_OVERRIDE:   ${{ inputs.chart_override }}
          BUG_JQL_OVERRIDE: ${{ inputs.bug_jql }}
        run: |
          python3 - <<'EOF'
          import json, os
          from pathlib import Path

          DEFAULT_JQL = "(issuetype = Bug OR labels in (bug, jira_escalated)) and issuetype!=sub-task and creator=557058:3e2ef232-d5c4-4c0e-94b0-977a305ebaae"
          JQL_CONFIG_PATH = Path("jql_config.json")

          # Load existing saved config (if any)
          jql_config = {}
          if JQL_CONFIG_PATH.exists():
              try:
                  jql_config = json.loads(JQL_CONFIG_PATH.read_text())
              except Exception:
                  jql_config = {}

          # ── Handle per-chart override (from dashboard UI "Save & Refresh") ──
          chart_override_raw = os.environ.get("CHART_OVERRIDE", "").strip()
          if chart_override_raw:
              try:
                  override = json.loads(chart_override_raw)
                  chart_id = override.get("chartId", "")
                  valid_ids = {"c1","c2","c3","c4","c5","c6","c7","c9"}
                  if chart_id in valid_ids:
                      charts = jql_config.setdefault("charts", {})
                      charts[chart_id] = {
                          k: override[k]
                          for k in ("bug_jql","resolved_statuses","months_of_history")
                          if k in override
                      }
                      JQL_CONFIG_PATH.write_text(json.dumps(jql_config, indent=2))
                      print(f"  Saved chart override for {chart_id}: {charts[chart_id]}")
                  else:
                      print(f"  Warning: unknown chartId '{chart_id}', skipping")
              except json.JSONDecodeError as e:
                  print(f"  Warning: invalid chart_override JSON — {e}")

          # ── Handle legacy global bug_jql override ──
          jql_override = os.environ.get("BUG_JQL_OVERRIDE", "").strip()
          if jql_override:
              jql_config["bug_jql"] = jql_override
              JQL_CONFIG_PATH.write_text(json.dumps(jql_config, indent=2))
              print(f"  Saved global JQL override: {jql_override}")

          # ── Determine effective global bug_jql ──
          effective_jql = jql_config.get("bug_jql", DEFAULT_JQL)
          print(f"  Global JQL: {effective_jql}")

          cfg = {
            "jira_url":               os.environ["JIRA_URL"],
            "email":                  os.environ["JIRA_EMAIL"],
            "api_token":              os.environ["JIRA_API_TOKEN"],
            "projects":               "OXDEV",
            "working_days_per_month": 20,
            "resolved_statuses":      ["Done", "To be reviewed by the customer", "Rejected"],
            "in_progress_status":     "In Progress",
            "bug_jql":                effective_jql,
            "team_field":             "customfield_10032",
            "months_of_history":      6,
            "github_repo":            "omerniddam/bug-dashboard",
            "github_workflow":        "refresh-dashboard.yml",
            "jira_proxy_url":         os.environ.get("JIRA_PROXY_URL", ""),
          }
          with open("config.json", "w") as f:
              json.dump(cfg, f, indent=2)
          print("config.json written")
          EOF

      # ── 5. Generate the dashboard HTML ──────────────────────────────────────
      - name: Generate dashboard
        run: python3 fetch_bugs.py

      # ── 6. Generate cache-busting index.html ────────────────────────────────
      # index.html redirects to bug_dashboard.html?v=TIMESTAMP so browsers
      # always fetch the latest version and never serve a stale cached copy.
      - name: Generate index.html with cache-busting redirect
        run: |
          TS=$(date -u +%Y%m%d%H%M%S)
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
            <meta http-equiv="Pragma" content="no-cache">
            <meta http-equiv="Expires" content="0">
            <meta http-equiv="refresh" content="0; url=bug_dashboard.html?v=${TS}">
            <title>Bug Dashboard</title>
          </head>
          <body>
            <p>Loading dashboard… <a href="bug_dashboard.html?v=${TS}">Click here if not redirected</a></p>
          </body>
          </html>
          EOF

      # ── 7. Commit the updated HTML back to the repo ─────────────────────────
      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bug_dashboard.html index.html
          git add jql_config.json 2>/dev/null || true
          # Only commit if anything actually changed
          git diff --cached --quiet || git commit -m "chore: refresh bug dashboard [skip ci]"
          git push

      # ── 7. (Optional) Deploy to hosting ─────────────────────────────────────
      # GitHub Pages: enable in repo Settings → Pages → Deploy from branch → main / (root)
      # No extra step needed — the commit above triggers Pages automatically.

      # --- Option B: Upload to AWS S3 ---
      # Add secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_BUCKET
      # - name: Deploy to S3
      #   env:
      #     AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #   run: |
      #     aws s3 cp bug_dashboard.html s3://${{ secrets.S3_BUCKET }}/bug_dashboard.html \
      #       --content-type text/html --cache-control "max-age=300"
